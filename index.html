<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Medical Store Billing System</title>

  <style>
    body {
      font-family: Arial;
      background: #f5f7fa;
      margin: 0;
    }

    header {
      background: #1976d2;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 24px;
    }

    .container {
      width: 80%;
      margin: 20px auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px gray;
    }

    input {
      padding: 10px;
      margin: 5px;
      width: 25%;
    }

    button {
      padding: 10px 15px;
      background: #1976d2;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #0d47a1;
    }

    table {
      width: 100%;
      margin-top: 20px;
      border-collapse: collapse;
    }

    table, th, td {
      border: 1px solid #ddd;
    }

    th {
      background: #1976d2;
      color: white;
    }

    th, td {
      padding: 10px;
      text-align: center;
    }

    .delete {
      background: red;
    }

    h3 {
      text-align: right;
    }
  </style>
</head>

<body>

<header>Medical Store Billing System</header>

<div class="container">

  <h2>Add Medicine</h2>

  <input type="text" id="medName" placeholder="Medicine Name">
  <input type="number" id="quantity" placeholder="Quantity">
  <input type="number" id="price" placeholder="Price">

  <button onclick="addMedicine()">Add</button>

  <h2>Bill Details</h2>

  <table>
    <thead>
      <tr>
        <th>Medicine</th>
        <th>Qty</th>
        <th>Price</th>
        <th>Total</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="billTable"></tbody>
  </table>

  <h3 id="grandTotal">Grand Total: ₹0</h3>

</div>

<script>
  let billItems = [];

  function addMedicine() {
    let name = document.getElementById("medName").value;
    let qty = document.getElementById("quantity").value;
    let price = document.getElementById("price").value;

    if (name === "" || qty === "" || price === "") {
      alert("Please fill all fields!");
      return;
    }

    let total = qty * price;

    let item = {
      name: name,
      qty: qty,
      price: price,
      total: total
    };

    billItems.push(item);
    displayBill();
    clearFields();
  }

  function displayBill() {
    let table = document.getElementById("billTable");
    table.innerHTML = "";

    let grandTotal = 0;

    billItems.forEach((item, index) => {
      grandTotal += item.total;

      let row = `
        <tr>
          <td>${item.name}</td>
          <td>${item.qty}</td>
          <td>₹${item.price}</td>
          <td>₹${item.total}</td>
          <td>
            <button class="delete" onclick="deleteItem(${index})">
              Delete
            </button>
          </td>
        </tr>
      `;
      table.innerHTML += row;
    });

    document.getElementById("grandTotal").innerText =
      "Grand Total: ₹" + grandTotal;
  }

  function deleteItem(index) {
    billItems.splice(index, 1);
    displayBill();
  }

  function clearFields() {
    document.getElementById("medName").value = "";
    document.getElementById("quantity").value = "";
    document.getElementById("price").value = "";
  }
</script>

</body>
</html>
